<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeriStepAI – Thuyết Minh Thông Minh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #E8A14B;
    --amber-light: #F2C47E;
    --dark: #0D0B08;
    --dark2: #1A1610;
    --dark3: #241E16;
    --cream: #F5ECD7;
    --cream-muted: #C4B49A;
    --red: #C0392B;
    --green: #2E7D5E;
  }

  body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Be Vietnam Pro', sans-serif;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Animated grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 100;
  }

  /* LEFT PANEL – Illustration / Brand */
  .left-panel {
    flex: 1.1;
    position: relative;
    background: var(--dark2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    padding: 60px;
  }

  /* Layered ambient glow */
  .left-panel::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,161,75,0.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    animation: pulse-glow 4s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  }

  /* Vietnamese lantern SVG scene */
  .scene-svg {
    position: relative;
    z-index: 2;
    width: 340px;
    animation: float 5s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .brand-text {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 36px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--amber);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .brand-name span {
    color: var(--cream);
  }

  .brand-tagline {
    font-size: 0.85rem;
    color: var(--cream-muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 10px;
    font-weight: 300;
  }

  /* Floating food icons */
  .food-icon {
    position: absolute;
    font-size: 1.8rem;
    opacity: 0;
    animation: float-food 6s ease-in-out infinite;
  }
  .food-icon:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
  .food-icon:nth-child(2) { top: 25%; right: 12%; animation-delay: 1s; }
  .food-icon:nth-child(3) { bottom: 30%; left: 8%; animation-delay: 2s; }
  .food-icon:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 3s; }
  .food-icon:nth-child(5) { top: 50%; left: 5%; animation-delay: 1.5s; }

  @keyframes float-food {
    0% { opacity: 0; transform: translateY(20px); }
    20% { opacity: 0.6; }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-20px); }
  }

  /* Sound wave bars */
  .sound-wave {
    display: flex;
    gap: 5px;
    align-items: center;
    margin-top: 28px;
    position: relative;
    z-index: 2;
  }

  .sound-bar {
    width: 4px;
    border-radius: 4px;
    background: var(--amber);
    animation: wave 1.2s ease-in-out infinite;
  }
  .sound-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
  .sound-bar:nth-child(2) { height: 36px; animation-delay: 0.1s; }
  .sound-bar:nth-child(3) { height: 28px; animation-delay: 0.2s; }
  .sound-bar:nth-child(4) { height: 44px; animation-delay: 0.15s; }
  .sound-bar:nth-child(5) { height: 32px; animation-delay: 0.25s; }
  .sound-bar:nth-child(6) { height: 22px; animation-delay: 0.05s; }
  .sound-bar:nth-child(7) { height: 38px; animation-delay: 0.3s; }
  .sound-bar:nth-child(8) { height: 18px; animation-delay: 0.12s; }
  .sound-bar:nth-child(9) { height: 30px; animation-delay: 0.22s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
    50% { transform: scaleY(1); opacity: 1; }
  }

  .wave-label {
    font-size: 0.72rem;
    color: var(--cream-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 10px;
    position: relative;
    z-index: 2;
  }

  /* Decorative divider line */
  .divider-line {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--amber), transparent);
    opacity: 0.4;
  }

  /* RIGHT PANEL – Login Form */
  .right-panel {
    flex: 0.9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 70px;
    position: relative;
    background: var(--dark);
  }

  .right-panel::before {
    content: '';
    position: absolute;
    bottom: -100px; right: -100px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(232,161,75,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }

  .login-header {
    margin-bottom: 44px;
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .login-welcome {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    color: var(--cream);
    font-weight: 700;
    line-height: 1.15;
  }

  .login-title em {
    color: var(--amber);
    font-style: italic;
  }

  .login-subtitle {
    color: var(--cream-muted);
    font-size: 0.88rem;
    margin-top: 12px;
    font-weight: 300;
    line-height: 1.6;
  }

  /* Form */
  .form-group {
    margin-bottom: 22px;
    position: relative;
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  .form-group:nth-child(1) { animation-delay: 0.1s; }
  .form-group:nth-child(2) { animation-delay: 0.2s; }

  label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream-muted);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .input-wrapper {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--amber);
    opacity: 0.7;
    font-size: 1rem;
    pointer-events: none;
  }

  input {
    width: 100%;
    padding: 16px 16px 16px 46px;
    background: var(--dark3);
    border: 1px solid rgba(232, 161, 75, 0.2);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 0.92rem;
    font-weight: 400;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input::placeholder { color: rgba(196, 180, 154, 0.4); }

  input:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(232,161,75,0.12);
  }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 0.78rem;
    color: var(--amber);
    text-decoration: none;
    margin-top: 8px;
    opacity: 0.8;
    transition: opacity 0.2s;
  }
  .forgot-link:hover { opacity: 1; }

  /* Options row */
  .options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
  }

  .remember-me {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .remember-me input[type="checkbox"] {
    width: 16px; height: 16px;
    padding: 0;
    accent-color: var(--amber);
    cursor: pointer;
  }

  .remember-me span {
    font-size: 0.8rem;
    color: var(--cream-muted);
  }

  /* Login button */
  .btn-login {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--amber) 0%, #D4873A 100%);
    border: none;
    border-radius: 10px;
    color: var(--dark);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    position: relative;
    overflow: hidden;
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
  }

  .btn-login::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(232,161,75,0.35);
    filter: brightness(1.05);
  }

  .btn-login:hover::before { left: 100%; }
  .btn-login:active { transform: translateY(0); }

  /* Divider */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
  }

  .or-divider::before, .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(196,180,154,0.15);
  }

  .or-divider span {
    font-size: 0.72rem;
    color: var(--cream-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Social login */
  .social-row {
    display: flex;
    gap: 12px;
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both;
  }

  .btn-social {
    flex: 1;
    padding: 13px;
    background: var(--dark3);
    border: 1px solid rgba(232,161,75,0.15);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: border-color 0.2s, background 0.2s;
    font-weight: 400;
  }

  .btn-social:hover {
    border-color: rgba(232,161,75,0.4);
    background: rgba(232,161,75,0.05);
  }

  .btn-social svg { width: 18px; height: 18px; }

  /* Register link */
  .register-link {
    text-align: center;
    margin-top: 30px;
    font-size: 0.82rem;
    color: var(--cream-muted);
    animation: slide-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
  }

  .register-link a {
    color: var(--amber);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .register-link a:hover { opacity: 0.75; }

  @keyframes slide-up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { flex-direction: column; overflow: auto; }
    .left-panel { padding: 50px 30px 40px; flex: none; }
    .scene-svg { width: 220px; }
    .brand-name { font-size: 2.2rem; }
    .right-panel { padding: 40px 28px; }
    .login-title { font-size: 1.9rem; }
  }
</style>
</head>
<body>

<!-- LEFT PANEL -->
<div class="left-panel">
  <span class="food-icon">🍜</span>
  <span class="food-icon">🥗</span>
  <span class="food-icon">🍱</span>
  <span class="food-icon">☕</span>
  <span class="food-icon">🎐</span>

  <!-- Illustrated SVG Scene: Vietnamese street food alley with mic / AI -->
  <svg class="scene-svg" viewBox="0 0 340 300" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background glow -->
    <circle cx="170" cy="150" r="120" fill="rgba(232,161,75,0.07)"/>

    <!-- Street food stall background -->
    <rect x="40" y="100" width="260" height="160" rx="12" fill="#1A1610" stroke="rgba(232,161,75,0.2)" stroke-width="1"/>

    <!-- Roof / awning -->
    <path d="M30 100 L170 60 L310 100 Z" fill="#241E16" stroke="rgba(232,161,75,0.3)" stroke-width="1.5"/>
    <!-- Awning detail -->
    <path d="M30 100 L60 85 L90 100 L120 85 L150 100 L180 85 L210 100 L240 85 L270 100 L300 85 L310 100" stroke="rgba(232,161,75,0.5)" stroke-width="1.5" fill="none"/>

    <!-- Lanterns -->
    <ellipse cx="100" cy="75" rx="10" ry="14" fill="#C0392B" opacity="0.9"/>
    <line x1="100" y1="61" x2="100" y2="55" stroke="rgba(232,161,75,0.5)" stroke-width="1.5"/>
    <line x1="100" y1="89" x2="100" y2="95" stroke="#C0392B" stroke-width="1.5"/>

    <ellipse cx="170" cy="68" rx="10" ry="14" fill="#E8A14B" opacity="0.9"/>
    <line x1="170" y1="54" x2="170" y2="48" stroke="rgba(232,161,75,0.5)" stroke-width="1.5"/>
    <line x1="170" y1="82" x2="170" y2="88" stroke="#E8A14B" stroke-width="1.5"/>

    <ellipse cx="240" cy="75" rx="10" ry="14" fill="#C0392B" opacity="0.9"/>
    <line x1="240" y1="61" x2="240" y2="55" stroke="rgba(232,161,75,0.5)" stroke-width="1.5"/>
    <line x1="240" y1="89" x2="240" y2="95" stroke="#C0392B" stroke-width="1.5"/>

    <!-- Lantern glow -->
    <circle cx="100" cy="75" r="18" fill="rgba(192,57,43,0.12)"/>
    <circle cx="170" cy="68" r="18" fill="rgba(232,161,75,0.15)"/>
    <circle cx="240" cy="75" r="18" fill="rgba(192,57,43,0.12)"/>

    <!-- Counter / table -->
    <rect x="55" y="190" width="230" height="12" rx="4" fill="#2E1E0F" stroke="rgba(232,161,75,0.2)" stroke-width="1"/>

    <!-- Bowl of pho -->
    <ellipse cx="110" cy="188" rx="28" ry="10" fill="#3D2414" stroke="rgba(232,161,75,0.3)" stroke-width="1"/>

    <!-- Chopsticks -->
    <line x1="115" y1="176" x2="118" y2="192" stroke="rgba(232,161,75,0.7)" stroke-width="1.5"/>
    <line x1="108" y1="176" x2="105" y2="192" stroke="rgba(232,161,75,0.7)" stroke-width="1.5"/>

    <!-- Coffee cup -->
    <rect x="195" y="175" width="26" height="22" rx="4" fill="#2A1A0A" stroke="rgba(232,161,75,0.3)" stroke-width="1"/>
    <path d="M221 181 Q230 181 230 187 Q230 193 221 193" fill="none" stroke="rgba(232,161,75,0.3)" stroke-width="1.2"/>
    <!-- Steam -->
    <path d="M204 174 Q206 168 204 162" stroke="rgba(232,161,75,0.4)" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M210 174 Q212 167 210 161" stroke="rgba(232,161,75,0.4)" stroke-width="1" fill="none" stroke-linecap="round"/>

    <!-- AI Microphone in center -->
    <rect x="150" y="120" width="40" height="56" rx="20" fill="#E8A14B"/>
    <rect x="156" y="126" width="28" height="40" rx="14" fill="#D4873A"/>
    <!-- Mic grille lines -->
    <line x1="159" y1="135" x2="181" y2="135" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="159" y1="141" x2="181" y2="141" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="159" y1="147" x2="181" y2="147" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <line x1="159" y1="153" x2="181" y2="153" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <!-- Mic stand -->
    <line x1="170" y1="176" x2="170" y2="192" stroke="#E8A14B" stroke-width="3" stroke-linecap="round"/>
    <line x1="158" y1="192" x2="182" y2="192" stroke="#E8A14B" stroke-width="3" stroke-linecap="round"/>
    <!-- AI spark on mic -->
    <circle cx="170" cy="148" r="8" fill="rgba(232,161,75,0.2)"/>
    <text x="167" y="152" font-size="10" fill="#FFF8F0">✦</text>

    <!-- Sound wave rings around mic -->
    <path d="M138 148 Q132 148 132 148" stroke="#E8A14B" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>
    <path d="M130 138 Q120 148 130 158" stroke="#E8A14B" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>
    <path d="M122 128 Q108 148 122 168" stroke="#E8A14B" stroke-width="1.5" fill="none" opacity="0.12" stroke-linecap="round"/>

    <path d="M202 148 Q208 148 208 148" stroke="#E8A14B" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>

  <div class="brand-text">
    <div class="brand-name">Heri<span>Step</span><span style="color:var(--amber-light)">AI</span></div>
    <div class="brand-tagline">Thuyết minh hàng quán thông minh</div>
  </div>

  <div class="sound-wave">
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
    <div class="sound-bar"></div>
  </div>
  <div class="wave-label">AI đang lắng nghe & giới thiệu</div>

  <div class="divider-line"></div>
</div>

<!-- RIGHT PANEL -->
<div class="right-panel">
  <div class="login-header">
    <div class="login-welcome">Chào mừng trở lại</div>
    <h1 class="login-title">Đăng nhập để<br><em>khám phá</em> ẩm thực</h1>
    <p class="login-subtitle">Quản lý thuyết minh tự động cho quán của bạn với trí tuệ nhân tạo HeriStepAI.</p>
  </div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">Email / Tài khoản</label>
      <div class="input-wrapper">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="tenban@example.com" required />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Mật khẩu</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Nhập mật khẩu" required />
      </div>
      <a href="#" class="forgot-link">Quên mật khẩu?</a>
    </div>

    <div class="options-row">
      <label class="remember-me">
        <input type="checkbox" /> <span>Ghi nhớ đăng nhập</span>
      </label>
    </div>

    <button type="submit" class="btn-login">🎙 Đăng Nhập</button>
  </form>

  <div class="or-divider"><span>hoặc đăng nhập với</span></div>

  <div class="social-row">
    <button class="btn-social">
      <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google
